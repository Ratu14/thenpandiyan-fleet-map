<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Thenpandiyan Fleet Dashboard</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --bg:         #f4f6f4;
    --surface:    #ffffff;
    --card:       #ffffff;
    --border:     #e2e8e2;
    --border2:    #d0d8d0;
    --green:      #1a7a3f;
    --green-mid:  #22a854;
    --green-lt:   #e8f5ee;
    --green-acc:  #16a34a;
    --header-bg:  #111714;
    --text:       #1a2020;
    --text2:      #4a5a50;
    --muted:      #8a9e90;
    --transit:    #16a34a;
    --stopped:    #d97706;
    --idle:       #dc2626;
    --transit-bg: #f0fdf4;
    --stopped-bg: #fffbeb;
    --idle-bg:    #fef2f2;
  }
  * { margin:0; padding:0; box-sizing:border-box; }
  body { background:var(--bg); color:var(--text); font-family:'Inter',sans-serif; min-height:100vh; }

  .header { background:var(--header-bg); padding:0 28px; height:52px; display:flex; align-items:center; justify-content:space-between; }
  .header-left { display:flex; align-items:center; gap:12px; }
  .logo-box { width:34px; height:34px; background:var(--green); border-radius:6px; display:flex; align-items:center; justify-content:center; font-size:14px; font-weight:800; color:white; font-family:'DM Mono',monospace; letter-spacing:-0.03em; flex-shrink:0; }
  .brand-name { font-size:15px; font-weight:600; color:#ffffff; letter-spacing:0.01em; }
  .brand-sub  { font-size:11px; color:var(--green-mid); font-weight:500; letter-spacing:0.08em; text-transform:uppercase; }
  .header-right { display:flex; align-items:center; gap:12px; }
  #lastUpdate { font-size:11px; color:#6b7a6e; font-family:'DM Mono',monospace; }
  .nav-pill { font-size:11px; font-weight:500; padding:5px 13px; border-radius:20px; cursor:pointer; color:#8a9e90; border:1px solid transparent; transition:all .15s; text-decoration:none; letter-spacing:0.03em; }
  .nav-pill:hover { color:white; }
  .nav-pill.active { background:var(--green); color:white; }
  .refresh-btn { background:var(--green); color:white; border:none; padding:6px 16px; border-radius:5px; cursor:pointer; font-size:12px; font-family:'Inter',sans-serif; font-weight:500; letter-spacing:0.03em; transition:background .2s; }
  .refresh-btn:hover { background:var(--green-acc); }
  .fleet-tag { background:transparent; border:1px solid var(--green-mid); color:var(--green-mid); font-size:11px; font-weight:600; padding:4px 12px; border-radius:4px; letter-spacing:0.1em; text-transform:uppercase; }

  .stats { background:var(--surface); border-bottom:1px solid var(--border); display:flex; }
  .stat { flex:1; padding:14px 20px; text-align:center; border-right:1px solid var(--border); }
  .stat:last-child { border-right:none; }
  .stat-val { font-size:26px; font-weight:700; line-height:1; font-family:'DM Mono',monospace; }
  .stat-lbl { font-size:10px; color:var(--muted); letter-spacing:0.1em; text-transform:uppercase; margin-top:4px; font-weight:500; }
  .c-total   { color:var(--text); }
  .c-transit { color:var(--transit); }
  .c-stopped { color:var(--stopped); }
  .c-idle    { color:var(--idle); }

  .section-wrap { padding:24px 28px 0; }
  .section-hdr { display:flex; align-items:center; justify-content:space-between; margin-bottom:14px; }
  .section-title { font-size:11px; font-weight:600; letter-spacing:0.12em; text-transform:uppercase; color:var(--green); display:flex; align-items:center; gap:8px; }
  .section-title::before { content:""; display:inline-block; width:28px; height:2px; background:var(--green); border-radius:2px; }
  .section-count { font-size:11px; color:var(--muted); font-family:'DM Mono',monospace; }

  .toolbar { display:flex; gap:10px; margin-bottom:16px; flex-wrap:wrap; align-items:center; }
  .search-wrap { flex:1; min-width:220px; position:relative; }
  .search-wrap input { width:100%; background:var(--surface); border:1px solid var(--border2); color:var(--text); padding:8px 12px 8px 34px; border-radius:6px; font-size:13px; outline:none; font-family:'Inter',sans-serif; transition:border-color .2s, box-shadow .2s; }
  .search-wrap input:focus { border-color:var(--green); box-shadow:0 0 0 3px rgba(26,122,63,0.08); }
  .search-wrap .s-icon { position:absolute; left:10px; top:50%; transform:translateY(-50%); color:var(--muted); font-size:14px; pointer-events:none; }
  .filter-pills { display:flex; gap:6px; flex-wrap:wrap; }
  .pill { padding:5px 12px; border-radius:20px; font-size:11px; font-weight:500; cursor:pointer; transition:all .15s; white-space:nowrap; border:1px solid var(--border2); color:var(--text2); background:var(--surface); font-family:'Inter',sans-serif; }
  .pill:hover { border-color:var(--green); color:var(--green); }
  .pill.active { background:var(--green); color:white; border-color:var(--green); }

  .loc-grid { display:grid; grid-template-columns:repeat(auto-fill, minmax(290px,1fr)); gap:12px; padding-bottom:28px; }
  .loc-card { background:var(--surface); border:1px solid var(--border); border-radius:8px; overflow:hidden; transition:box-shadow .2s, border-color .2s; }
  .loc-card:hover { box-shadow:0 4px 16px rgba(0,0,0,0.07); border-color:var(--border2); }
  .loc-card.hidden { display:none; }
  .loc-head { padding:12px 14px 10px; border-bottom:1px solid var(--border); }
  .loc-top  { display:flex; align-items:flex-start; justify-content:space-between; gap:8px; margin-bottom:6px; }
  .loc-name { font-size:13px; font-weight:600; color:var(--text); line-height:1.3; }
  .loc-type-badge { font-size:9px; font-weight:700; padding:2px 8px; border-radius:3px; letter-spacing:0.08em; text-transform:uppercase; flex-shrink:0; margin-top:2px; font-family:'DM Mono',monospace; }
  .type-load   { background:var(--green-lt); color:var(--green); border:1px solid #b7dfc6; }
  .type-unload { background:#eff6ff; color:#2563eb; border:1px solid #bfdbfe; }
  .type-both   { background:#f5f3ff; color:#7c3aed; border:1px solid #ddd6fe; }
  .loc-info-row { display:flex; align-items:center; gap:6px; flex-wrap:wrap; margin-bottom:4px; }
  .tag-state { font-size:10px; padding:2px 8px; border-radius:3px; background:#eef2ee; color:var(--green); font-weight:600; border:1px solid #c8dccb; }
  .tag-ktt { font-size:10px; padding:2px 8px; border-radius:3px; background:#f8f4ff; color:#7c3aed; font-weight:600; border:1px solid #e0d5f5; font-family:'DM Mono',monospace; }
  .tag-cap { font-size:10px; padding:2px 7px; border-radius:3px; background:var(--bg); color:var(--text2); border:1px solid var(--border2); font-family:'DM Mono',monospace; }
  .loc-coords { font-size:10px; color:var(--muted); font-family:'DM Mono',monospace; margin-top:4px; }
  .loc-vehicles { padding:8px 14px 10px; }
  .loc-veh-hdr { font-size:10px; color:var(--muted); text-transform:uppercase; letter-spacing:0.1em; padding-bottom:6px; font-weight:500; }
  .veh-row { display:flex; align-items:center; justify-content:space-between; padding:5px 0; border-bottom:1px solid #f0f4f0; }
  .veh-row:last-of-type { border-bottom:none; }
  .veh-vno { font-size:12px; font-weight:600; color:var(--text); font-family:'DM Mono',monospace; }
  .veh-right { display:flex; align-items:center; gap:8px; }
  .veh-dist { font-size:12px; font-weight:700; color:var(--green); font-family:'DM Mono',monospace; }
  .veh-st { font-size:9px; font-weight:600; padding:2px 6px; border-radius:3px; text-transform:uppercase; letter-spacing:0.05em; }
  .s-transit { background:var(--transit-bg); color:var(--transit); }
  .s-stopped { background:var(--stopped-bg); color:var(--stopped); }
  .s-idle    { background:var(--idle-bg);    color:var(--idle); }
  .no-veh { font-size:11px; color:var(--muted); padding:6px 0; font-style:italic; }
  .show-more-btn { font-size:11px; color:var(--green); cursor:pointer; padding:4px 0 0; background:none; border:none; font-family:'Inter',sans-serif; font-weight:500; }
  .hidden-veh { display:none; }

  .page-divider { border:none; border-top:1px solid var(--border); margin:0 28px; }

  .veh-grid { display:grid; grid-template-columns:repeat(auto-fill, minmax(240px,1fr)); gap:12px; padding-bottom:32px; }
  .v-card { background:var(--surface); border:1px solid var(--border); border-radius:8px; padding:14px 16px; transition:box-shadow .2s, border-color .2s; border-top:3px solid transparent; }
  .v-card:hover { box-shadow:0 4px 16px rgba(0,0,0,0.06); }
  .v-card.transit { border-top-color:var(--transit); }
  .v-card.stopped { border-top-color:var(--stopped); }
  .v-card.idle    { border-top-color:var(--idle); }
  .v-vno { font-size:15px; font-weight:700; color:var(--text); margin-bottom:6px; }
  .v-badge { display:inline-block; font-size:10px; font-weight:600; padding:3px 9px; border-radius:4px; margin-bottom:10px; letter-spacing:0.05em; font-family:'DM Mono',monospace; }
  .b-transit { background:var(--transit-bg); color:var(--transit); }
  .b-stopped { background:var(--stopped-bg); color:var(--stopped); }
  .b-idle    { background:var(--idle-bg);    color:var(--idle); }
  .v-row { display:flex; justify-content:space-between; font-size:12px; padding:5px 0; border-bottom:1px solid #f0f4f0; }
  .v-row:last-of-type { border-bottom:none; }
  .v-lbl { color:var(--muted); font-weight:400; }
  .v-val { font-weight:600; color:var(--text); font-family:'DM Mono',monospace; font-size:12px; }
  .v-coords { font-size:10px; color:var(--muted); margin-top:8px; font-family:'DM Mono',monospace; }
  .mapbtn { display:block; margin-top:10px; background:var(--green-lt); color:var(--green); text-align:center; padding:7px; border-radius:5px; cursor:pointer; border:1px solid #b7dfc6; font-size:12px; font-weight:500; font-family:'Inter',sans-serif; width:100%; transition:all .2s; }
  .mapbtn:hover { background:var(--green); color:white; border-color:var(--green); }

  .map-overlay { display:none; position:fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.55); z-index:9999; justify-content:center; align-items:center; }
  .map-overlay.show { display:flex; }
  .modal-content { background:white; border-radius:10px; overflow:hidden; width:90%; height:80%; box-shadow:0 20px 60px rgba(0,0,0,0.25); }
  .modal-header { background:var(--header-bg); color:white; padding:10px 18px; display:flex; justify-content:space-between; align-items:center; font-size:14px; font-weight:600; }
  .close-btn { background:none; border:none; color:#8a9e90; font-size:22px; cursor:pointer; line-height:1; }
  .close-btn:hover { color:var(--idle); }
  #map-iframe { width:100%; height:calc(100% - 44px); border:none; }

  .loading { text-align:center; padding:60px 20px; color:var(--muted); font-size:13px; letter-spacing:0.05em; }
  .error   { text-align:center; padding:40px 20px; color:var(--idle); font-size:13px; }
</style>
</head>
<body>

<div class="header">
  <div class="header-left">
    <div class="logo-box">TT</div>
    <div>
      <div class="brand-name">Thenpandiyan Transport</div>
      <div class="brand-sub">Live Fleet Dashboard</div>
    </div>
  </div>
  <div class="header-right">
    <span id="lastUpdate"></span>
    <a href="index.html" class="nav-pill active">Fleet Dashboard</a>
    <a href="tat.html" class="nav-pill">TAT Analytics</a>
    <button class="refresh-btn" onclick="fetchVehicles()">&#8635; Refresh</button>
    <span class="fleet-tag">LPG Bulk Transport</span>
  </div>
</div>

<div class="stats">
  <div class="stat"><div class="stat-val c-total"   id="cTotal">&#8212;</div><div class="stat-lbl">Total Vehicles</div></div>
  <div class="stat"><div class="stat-val c-transit" id="cTransit">&#8212;</div><div class="stat-lbl">In Transit</div></div>
  <div class="stat"><div class="stat-val c-stopped" id="cStopped">&#8212;</div><div class="stat-lbl">Stopped</div></div>
  <div class="stat"><div class="stat-val c-idle"    id="cIdle">&#8212;</div><div class="stat-lbl">Idle</div></div>
</div>

<div class="section-wrap">
  <div class="section-hdr">
    <div class="section-title">Locations &#8212; Nearest Vehicles</div>
    <div class="section-count" id="locCount"></div>
  </div>
  <div class="toolbar">
    <div class="search-wrap">
      <span class="s-icon">&#128269;</span>
      <input type="text" id="locSearch" placeholder="Search location, state, KTT zone code&#8230;" oninput="filterLocations()">
    </div>
    <div class="filter-pills" id="statePills"></div>
  </div>
  <div class="loc-grid" id="locGrid">
    <div class="loading">&#9203; Fetching vehicle data&#8230;</div>
  </div>
</div>

<hr class="page-divider">

<div class="section-wrap" style="padding-top:24px">
  <div class="section-hdr">
    <div class="section-title">All Vehicles &#8212; Live Status</div>
  </div>
  <div class="veh-grid" id="vehGrid">
    <div class="loading">&#9203; Loading&#8230;</div>
  </div>
</div>

<div class="map-overlay" id="mapModal">
  <div class="modal-content">
    <div class="modal-header">
      <span id="modal-title">Vehicle Location</span>
      <button class="close-btn" onclick="closeMap()">&#10005;</button>
    </div>
    <iframe id="map-iframe" src=""></iframe>
  </div>
</div>

<script>
const API_URL = "https://thenpandiyan-fleet-proxy.ratulpal1114.workers.dev/";

const LOADING_LOCATIONS = [
  { name:"Mangalore - HPCL",                      lat:12.976278, lon:74.833787, state:"Karnataka",     capacity:"18MT",                                    type:"Load", ktt:"TPT063" },
  { name:"Bahadurgarh",                            lat:28.734938, lon:76.856792, state:"Haryana",       capacity:"12MT, 16MT",                              type:"Load", ktt:"TPT062" },
  { name:"Bhatinda - Punjab",                      lat:29.933897, lon:74.980591, state:"Punjab",        capacity:"15.5MT",                                  type:"Load", ktt:"TPT010" },
  { name:"Paradeep",                               lat:20.288786, lon:86.627457, state:"Odisha",        capacity:"16MT, 18MT",                              type:"Load", ktt:"TPT096" },
  { name:"AGS Mangalore",                          lat:12.914930, lon:74.815147, state:"Karnataka",     capacity:"18MT, 21MT",                              type:"Load", ktt:"TPT151" },
  { name:"CPCL - Chennai",                         lat:13.183284, lon:80.267143, state:"Tamil Nadu",    capacity:"15.5MT, 16MT, 18MT, 20.55MT, 21MT",       type:"Load", ktt:"TPT025" },
  { name:"IPPL - Chennai",                         lat:13.252232, lon:80.300095, state:"Tamil Nadu",    capacity:"",                                        type:"Load", ktt:"TPT068" },
  { name:"IPPL - Haldia",                          lat:22.081457, lon:88.109360, state:"West Bengal",   capacity:"",                                        type:"Load", ktt:"TPT056" },
  { name:"Vinathi Organics Limited",               lat:17.594828, lon:73.489067, state:"Maharashtra",   capacity:"18MT",                                    type:"Load", ktt:"TPT148" },
  { name:"Vadodara - Reliance",                    lat:22.385229, lon:73.119904, state:"Gujarat",       capacity:"18MT, 21MT",                              type:"Load", ktt:"TPT104" },
  { name:"Kothari Petrochemicals - Manali",        lat:13.157072, lon:80.273822, state:"Tamil Nadu",    capacity:"18MT, 20.55MT, 21MT",                     type:"Both", ktt:"TPT082" },
  { name:"Tirutani (Vanganoor) - Meena",           lat:13.179621, lon:79.456275, state:"Tamil Nadu",    capacity:"16MT, 18MT, 21MT",                        type:"Both", ktt:"TPT089" },
  { name:"Meena Covai",                            lat:10.869603, lon:76.902797, state:"Tamil Nadu",    capacity:"7MT, 12MT, 15.5MT, 18MT, 20.55MT, 21MT", type:"Both", ktt:"TPT086" },
  { name:"Namakkal - Meena",                       lat:11.293393, lon:78.170366, state:"Tamil Nadu",    capacity:"7MT, 12MT, 15.5MT, 16MT, 18MT, 20.55MT, 21MT", type:"Both", ktt:"TPT087" },
  { name:"Meena Cheyyar",                          lat:12.709895, lon:79.632626, state:"Tamil Nadu",    capacity:"7MT, 18MT, 20.55MT, 21MT",                type:"Both", ktt:"TPT088" },
  { name:"TOTAL Bengaluru",                        lat:13.100626, lon:77.359459, state:"Karnataka",     capacity:"12MT",                                    type:"Load", ktt:"TPT139" },
  { name:"Bangalore - Sree Surya Petroleum",       lat:9.632178,  lon:76.776287, state:"Karnataka",     capacity:"18MT, 21MT",                              type:"Both", ktt:"TPT115" },
  { name:"Super Gas - Chennai",                    lat:12.910364, lon:79.931253, state:"Tamil Nadu",    capacity:"18MT, 21MT",                              type:"Load", ktt:"TPT124" },
  { name:"PETREGAZ - Krishnapatnam, Nellore",      lat:14.274434, lon:80.137527, state:"Andhra Pradesh",capacity:"7MT, 12MT, 15.5MT, 18MT, 21MT",           type:"Load", ktt:"TPT097" },
  { name:"Jaigad - Ratnagiri",                     lat:17.299386, lon:73.201151, state:"Maharashtra",   capacity:"",                                        type:"Load", ktt:"TPT070" },
];

var allStates = [];
LOADING_LOCATIONS.forEach(function(l) {
  if(l.state && allStates.indexOf(l.state) === -1) allStates.push(l.state);
});
allStates.sort();
var activeState = "ALL";

(function() {
  var c = document.getElementById("statePills");
  function makePill(label, value) {
    var p = document.createElement("span");
    p.className = "pill" + (value === "ALL" ? " active" : "");
    p.textContent = label;
    p.onclick = function() { setStateFilter(value); };
    c.appendChild(p);
  }
  makePill("All States", "ALL");
  allStates.forEach(function(s) { makePill(s, s); });
})();

function setStateFilter(state) {
  activeState = state;
  document.querySelectorAll(".pill").forEach(function(p) {
    var matches = (state === "ALL" && p.textContent === "All States") || (p.textContent === state);
    p.classList.toggle("active", matches);
  });
  filterLocations();
}

function haversine(lat1,lon1,lat2,lon2) {
  var R=6371, dLat=(lat2-lat1)*Math.PI/180, dLon=(lon2-lon1)*Math.PI/180;
  var a=Math.sin(dLat/2)*Math.sin(dLat/2)+Math.cos(lat1*Math.PI/180)*Math.cos(lat2*Math.PI/180)*Math.sin(dLon/2)*Math.sin(dLon/2);
  return R*2*Math.atan2(Math.sqrt(a),Math.sqrt(1-a));
}
function getStatus(spd,ign) {
  if(spd>0 && ign==1) return "TRANSIT";
  if(spd==0 && ign==1) return "STOPPED";
  return "IDLE";
}
function fmtDist(km) {
  if(km<1) return (km*1000).toFixed(0)+" m";
  if(km<10) return km.toFixed(1)+" km";
  return Math.round(km)+" km";
}

function filterLocations() {
  var q = document.getElementById("locSearch").value.toLowerCase().trim();
  var cards = document.querySelectorAll(".loc-card");
  var visible = 0;
  cards.forEach(function(card) {
    var n   = (card.dataset.name  || "").toLowerCase();
    var st  = (card.dataset.state || "");
    var ktt = (card.dataset.ktt   || "").toLowerCase();
    var mq  = !q || n.includes(q) || st.toLowerCase().includes(q) || ktt.includes(q);
    var ms  = activeState === "ALL" || st === activeState;
    if(mq && ms) { card.classList.remove("hidden"); visible++; }
    else          { card.classList.add("hidden"); }
  });
  document.getElementById("locCount").textContent = visible + " of " + LOADING_LOCATIONS.length + " locations";
}

var TOP_N = 5;

function renderLocations(vehicles) {
  var grid = document.getElementById("locGrid");
  grid.innerHTML = "";
  LOADING_LOCATIONS.forEach(function(loc) {
    var withDist = vehicles.map(function(v) {
      return { vno:v.vno, dist:haversine(parseFloat(v.lat),parseFloat(v.lon),loc.lat,loc.lon), status:getStatus(v.spd,v.ign) };
    }).sort(function(a,b){ return a.dist-b.dist; });

    var card = document.createElement("div");
    card.className = "loc-card";
    card.dataset.name  = loc.name;
    card.dataset.state = loc.state;
    card.dataset.ktt   = loc.ktt;

    var typeCls = loc.type === "Both" ? "type-both" : loc.type === "Unload" ? "type-unload" : "type-load";
    var capTags = loc.capacity ? loc.capacity.split(",").slice(0,4).map(function(c){ return "<span class='tag-cap'>"+c.trim()+"</span>"; }).join("") : "";

    var head = "<div class='loc-head'><div class='loc-top'><div class='loc-name'>"+loc.name+"</div><span class='loc-type-badge "+typeCls+"'>"+loc.type+"</span></div><div class='loc-info-row'><span class='tag-state'>"+loc.state+"</span><span class='tag-ktt'>"+loc.ktt+"</span></div>"+(capTags?"<div class='loc-info-row' style='margin-top:2px'>"+capTags+"</div>":"")+"<div class='loc-coords'>"+loc.lat.toFixed(5)+"&#176; N, "+loc.lon.toFixed(5)+"&#176; E</div></div>";

    var rows = "";
    if(withDist.length === 0) {
      rows = "<div class='no-veh'>No vehicle data available</div>";
    } else {
      withDist.forEach(function(v, i) {
        var sc = v.status==="TRANSIT" ? "s-transit" : v.status==="STOPPED" ? "s-stopped" : "s-idle";
        var extra = i >= TOP_N ? " hidden-veh" : "";
        rows += "<div class='veh-row"+extra+"'><span class='veh-vno'>"+v.vno+"</span><div class='veh-right'><span class='veh-st "+sc+"'>"+v.status+"</span><span class='veh-dist'>"+fmtDist(v.dist)+"</span></div></div>";
      });
    }

    var showMoreBtn = withDist.length > TOP_N ? "<button class='show-more-btn' onclick='toggleMore(this)'>&#9660; Show "+(withDist.length-TOP_N)+" more</button>" : "";
    card.innerHTML = head + "<div class='loc-vehicles'><div class='loc-veh-hdr'>Nearby vehicles by distance</div>" + rows + showMoreBtn + "</div>";
    grid.appendChild(card);
  });
  document.getElementById("locCount").textContent = LOADING_LOCATIONS.length + " of " + LOADING_LOCATIONS.length + " locations";
  filterLocations();
}

function toggleMore(btn) {
  var card = btn.closest(".loc-card");
  var hidden = card.querySelectorAll(".hidden-veh");
  var expanded = btn.dataset.expanded === "1";
  hidden.forEach(function(el){ el.style.display = expanded ? "none" : "flex"; });
  btn.dataset.expanded = expanded ? "0" : "1";
  btn.textContent = expanded ? ("&#9660; Show "+hidden.length+" more") : "&#9650; Show less";
}

function renderVehicles(vehicles) {
  var grid = document.getElementById("vehGrid");
  grid.innerHTML = "";
  var transit=0, stopped=0, idle=0;
  vehicles.forEach(function(v) {
    var st   = getStatus(v.spd, v.ign);
    var cls  = st==="TRANSIT" ? "transit" : st==="STOPPED" ? "stopped" : "idle";
    var bcls = st==="TRANSIT" ? "b-transit" : st==="STOPPED" ? "b-stopped" : "b-idle";
    if(st==="TRANSIT") transit++;
    else if(st==="STOPPED") stopped++;
    else idle++;
    var card = document.createElement("div");
    card.className = "v-card "+cls;
    card.innerHTML = "<div class='v-vno'>&#128667; "+v.vno+"</div><span class='v-badge "+bcls+"'>"+st+"</span><div class='v-row'><span class='v-lbl'>Speed</span><span class='v-val'>"+v.spd+" km/h</span></div><div class='v-row'><span class='v-lbl'>Ignition</span><span class='v-val'>"+(v.ign==1?"ON":"OFF")+"</span></div><div class='v-row'><span class='v-lbl'>Course</span><span class='v-val'>"+v.crs+"&#176;</span></div><div class='v-row'><span class='v-lbl'>GPS Time</span><span class='v-val'>"+v.time+"</span></div><div class='v-coords'>"+parseFloat(v.lat).toFixed(5)+"&#176; N &nbsp;|&nbsp; "+parseFloat(v.lon).toFixed(5)+"&#176; E</div><button class='mapbtn' onclick='openMap("+v.lat+","+v.lon+",\""+v.vno+"\")'>&#128205; View on Map</button>";
    grid.appendChild(card);
  });
  document.getElementById("cTotal").innerText   = vehicles.length;
  document.getElementById("cTransit").innerText = transit;
  document.getElementById("cStopped").innerText = stopped;
  document.getElementById("cIdle").innerText    = idle;
  document.getElementById("lastUpdate").innerText = "Live &#183; "+new Date().toLocaleTimeString();
}

function fetchVehicles() {
  fetch(API_URL)
    .then(function(r){ return r.json(); })
    .then(function(data) {
      if(data.success && data.results && data.results.length > 0) {
        renderVehicles(data.results);
        renderLocations(data.results);
      } else {
        document.getElementById("vehGrid").innerHTML = '<div class="error">No data returned: '+JSON.stringify(data)+'</div>';
      }
    })
    .catch(function(err) {
      document.getElementById("vehGrid").innerHTML = '<div class="error">Connection error: '+err.message+'</div>';
    });
}

function openMap(lat,lon,vno) {
  document.getElementById("modal-title").innerText = "&#128205; "+vno+" &#8212; Live Location";
  document.getElementById("map-iframe").src = "https://maps.google.com/maps?q="+lat+","+lon+"&z=15&output=embed";
  document.getElementById("mapModal").classList.add("show");
}
function closeMap() {
  document.getElementById("mapModal").classList.remove("show");
  document.getElementById("map-iframe").src = "";
}

fetchVehicles();
setInterval(fetchVehicles, 60000);
</script>
</body>
</html>
